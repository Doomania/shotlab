<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0c0c0e"/><stop offset="100%" stop-color="#15151a"/></linearGradient>
    <radialGradient id="glow" cx="75%" cy="8%" r="55%"><stop offset="0%" stop-color="#e0a84b" stop-opacity=".12"/><stop offset="100%" stop-color="transparent"/></radialGradient>
    <clipPath id="screen"><rect x="640" y="110" width="480" height="270" rx="8"/></clipPath>
  </defs>
  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- scanline texture -->
  <rect width="1200" height="630" fill="url(#scan)" opacity=".04"/>
  <!-- left copy -->
  <text x="80" y="240" font-family="'Arial Narrow',Arial,sans-serif" font-size="96" font-weight="700" letter-spacing="4" fill="#ece8df">SHOT</text>
  <text x="80" y="336" font-family="'Arial Narrow',Arial,sans-serif" font-size="96" font-weight="700" letter-spacing="4" fill="#e0a84b">LAB</text>
  <text x="82" y="390" font-family="'Courier New',monospace" font-size="18" letter-spacing="6" fill="#8d8a82">AI CAMERA MOVEMENT STUDIO</text>
  <!-- model pills -->
  <g font-family="'Courier New',monospace" font-size="14" fill="#ece8df">
    <rect x="82" y="420" width="90" height="28" rx="14" fill="none" stroke="#383842" stroke-width="1"/>
    <text x="127" y="439" text-anchor="middle" fill="#8d8a82">Seedance</text>
    <rect x="182" y="420" width="66" height="28" rx="14" fill="none" stroke="#383842" stroke-width="1"/>
    <text x="215" y="439" text-anchor="middle" fill="#8d8a82">Kling</text>
    <rect x="258" y="420" width="70" height="28" rx="14" fill="none" stroke="#383842" stroke-width="1"/>
    <text x="293" y="439" text-anchor="middle" fill="#8d8a82">Runway</text>
    <rect x="338" y="420" width="50" height="28" rx="14" fill="none" stroke="#383842" stroke-width="1"/>
    <text x="363" y="439" text-anchor="middle" fill="#8d8a82">Veo</text>
    <rect x="398" y="420" width="48" height="28" rx="14" fill="none" stroke="#383842" stroke-width="1"/>
    <text x="422" y="439" text-anchor="middle" fill="#8d8a82">Pika</text>
    <rect x="456" y="420" width="52" height="28" rx="14" fill="none" stroke="#383842" stroke-width="1"/>
    <text x="482" y="439" text-anchor="middle" fill="#8d8a82">Luma</text>
  </g>
  <!-- monitor bezel -->
  <rect x="624" y="86" width="512" height="340" rx="14" fill="#191920" stroke="#383842" stroke-width="1.5"/>
  <!-- screen -->
  <rect x="640" y="110" width="480" height="270" rx="8" fill="#08080b"/>
  <!-- floor grid inside screen -->
  <g clip-path="url(#screen)" opacity=".45">
    <line x1="640" y1="340" x2="1120" y2="250" stroke="#2a2a32" stroke-width="1"/>
    <line x1="640" y1="340" x2="880" y2="180" stroke="#2a2a32" stroke-width="1"/>
    <line x1="640" y1="340" x2="1120" y2="340" stroke="#2a2a32" stroke-width="1"/>
    <line x1="880" y1="380" x2="880" y2="160" stroke="#2a2a32" stroke-width="1"/>
    <line x1="760" y1="380" x2="800" y2="160" stroke="#2a2a32" stroke-width="1"/>
    <line x1="1000" y1="380" x2="960" y2="160" stroke="#2a2a32" stroke-width="1"/>
  </g>
  <!-- subject dummy -->
  <g clip-path="url(#screen)">
    <rect x="862" y="185" width="36" height="70" rx="10" fill="#e0a84b"/>
    <circle cx="880" cy="178" r="16" fill="#e0a84b"/>
    <rect x="845" y="205" width="14" height="60" rx="6" fill="#c8943d" transform="rotate(-8 852 205)"/>
    <rect x="901" y="205" width="14" height="60" rx="6" fill="#c8943d" transform="rotate(8 908 205)"/>
    <rect x="856" y="255" width="12" height="50" rx="5" fill="#c8943d"/>
    <rect x="878" y="255" width="12" height="50" rx="5" fill="#c8943d"/>
    <ellipse cx="880" cy="312" rx="22" ry="6" fill="rgba(0,0,0,.5)"/>
  </g>
  <!-- HUD corners -->
  <g stroke="rgba(236,232,223,.55)" stroke-width="2" fill="none">
    <path d="M652 122 L652 140 M652 122 L670 122"/>
    <path d="M1108 122 L1108 140 M1108 122 L1090 122"/>
    <path d="M652 368 L652 350 M652 368 L670 368"/>
    <path d="M1108 368 L1108 350 M1108 368 L1090 368"/>
  </g>
  <!-- reticle -->
  <line x1="880" y1="215" x2="880" y2="265" stroke="rgba(224,168,75,.4)" stroke-width="1"/>
  <line x1="855" y1="245" x2="905" y2="245" stroke="rgba(224,168,75,.4)" stroke-width="1"/>
  <!-- REC dot -->
  <circle cx="670" cy="128" r="5" fill="#d6473a"/>
  <text x="682" y="133" font-family="'Courier New',monospace" font-size="13" fill="#d6473a" letter-spacing="2">REC</text>
  <!-- timecode -->
  <text x="1096" y="133" font-family="'Courier New',monospace" font-size="12" fill="rgba(236,232,223,.8)" text-anchor="end">00:00:04:12</text>
  <!-- move label -->
  <text x="880" y="362" font-family="'Arial Narrow',Arial,sans-serif" font-size="22" font-weight="700" letter-spacing="3" fill="#e0a84b" text-anchor="middle">DOLLY IN</text>
  <!-- vignette -->
  <radialGradient id="vig" cx="50%" cy="50%" r="55%"><stop offset="0%" stop-color="transparent"/><stop offset="100%" stop-color="rgba(0,0,0,.65)"/></radialGradient>
  <rect x="640" y="110" width="480" height="270" rx="8" fill="url(#vig)"/>
  <!-- 38 moves label -->
  <text x="80" y="550" font-family="'Courier New',monospace" font-size="14" fill="#8d8a82" letter-spacing="4">38 CAMERA MOVES  ·  6 AI MODELS  ·  3D STUDIO</text>
  <!-- amber underline accent -->
  <rect x="80" y="358" width="520" height="2" fill="#e0a84b" opacity=".25"/>
</svg>